[rust]
disabled = false
symbol = "Óě® "
format = "[ÓāĽ](bg:color_bg fg:color_fg)[ $symbol($version) ]($style)"
style = "bg:color_bg fg:color_ter"

[time]
disabled = false
format = "[ $time ÔÄó  ]($style)"
style = "bg:color_bg fg:color_pri"
time_format = "%H:%M"

[username]
disabled = false
show_always = true
format = "[ $user ]($style)"
style_root = "bg:color_bg fg:bold color_err"
style_user = "bg:color_bg fg:color_pri"
