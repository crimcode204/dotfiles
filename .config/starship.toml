palette = "matugen"

[palettes.matugen]
color_bg  = "bright-black"
color_fg  = "white"
color_pri = "bright-blue"
color_sec = "bright-green"
color_ter = "bright-yellow"
color_err = "red"

[c]
disabled = false
symbol = "Óėě "
format = "[ÓāĽ](bg:color_bg fg:color_fg)[ $symbol($version( $name)) ]($style)"
style = "bg:color_bg fg:color_ter"

[cpp]
disabled = false
symbol = "ÓėĚ "
format = "[ÓāĽ](bg:color_bg fg:color_fg)[ $symbol($version( $name)) ]($style)"
style = "bg:color_bg fg:color_ter"

[cmd_duration]
disabled = false
format = "[ $duration ůĪéę ]($style)[ÓāĻ](bg:color_bg fg:color_fg)"
style = "bg:color_bg fg:color_pri"

[directory]
disabled = false
truncation_length = 3
format = "[ÓāĽ](bg:color_bg fg:color_fg)[ $path ]($style)"
style = "bg:color_bg fg:color_pri"

[fill]
disabled = false
symbol = " "

[git_branch]
disabled = false
symbol = "Óā† "
format = "[ÓāĽ](bg:color_bg fg:color_fg)[ $symbol$branch]($style)"
style = "bg:color_bg fg:color_sec"

[git_status]
disabled = false
format = "[ $all_status$ahead_behind ]($style)"
style = "bg:color_bg fg:color_sec"

[lua]
disabled = false
symbol = "ůįĘĪ "
format = "[ÓāĽ](bg:color_bg fg:color_fg)[ $symbol($version) ]($style)"
