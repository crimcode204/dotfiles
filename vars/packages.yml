    - ripgrep
    - stow

  fonts:
    - noto-fonts
    - noto-fonts-cjk
    - noto-fonts-emoji
    - ttf-jetbrains-mono-nerd
    - ttf-noto-nerd

  apps:
    - discord
    - keepassxc
